<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px; }
  .row { display:flex; align-items:flex-end; gap: 14px; }
  .col { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .bar { width: 30px; background: var(--ap-gradient-brand); border-radius: 4px; }
  .lab { font-family: var(--ap-font-mono); font-size: 10px; color: var(--ap-text-tertiary); }
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><span class="lab">1·4</span></div>
    <div class="col"><div class="bar" style="height:8px"></div><span class="lab">2·8</span></div>
    <div class="col"><div class="bar" style="height:12px"></div><span class="lab">3·12</span></div>
    <div class="col"><div class="bar" style="height:16px"></div><span class="lab">4·16</span></div>
    <div class="col"><div class="bar" style="height:24px"></div><span class="lab">5·24</span></div>
    <div class="col"><div class="bar" style="height:32px"></div><span class="lab">6·32</span></div>
    <div class="col"><div class="bar" style="height:48px"></div><span class="lab">7·48</span></div>
    <div class="col"><div class="bar" style="height:64px"></div><span class="lab">8·64</span></div>
    <div class="col"><div class="bar" style="height:96px"></div><span class="lab">9·96</span></div>
  </div>
</body></html>
