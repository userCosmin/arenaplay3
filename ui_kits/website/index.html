<!-- @dsCard group="Website" viewport="1320x860" name="Arena Play website" subtitle="Interactive multi-screen recreation — home, games, parties, edu, booking" -->
<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arena Play — Website UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; background: var(--ap-bg); }
  /* hide lucide raw tags until replaced */
  [data-lucide] { width: 0; height: 0; }
</style>
</head>
<body style="background-color: rgb(6, 11, 32)">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>

<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="ExperienceGrid.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel" src="GamesScreen.jsx"></script>
<script type="text/babel" src="PartyScreen.jsx"></script>
<script type="text/babel" src="EduScreen.jsx"></script>
<script type="text/babel" src="BookingScreen.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
  const { useState, useEffect } = React;
  function App() {
    const [view, setView] = useState('home');
    const nav = (v) => { setView(v); window.scrollTo({ top: 0, behavior: 'smooth' }); };
    useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
    return (
      <div data-screen-label={view}>
        <Nav current={view} onNav={nav} />
        {view === 'home' && (
          <main>
            <Hero onNav={nav} />
            <ExperienceGrid />
            <PricingStrip onNav={nav} />
            <FinalCTA onNav={nav} />
          </main>
        )}
        {view === 'games' && <main><GamesScreen /></main>}
        {view === 'party' && <main><PartyScreen onNav={nav} /></main>}
        {view === 'edu' && <main><EduScreen onNav={nav} /></main>}
        {view === 'book' && <main><BookingScreen /></main>}
        <Footer onNav={nav} />
        <WhatsAppButton />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
