<!-- @dsCard group="Components" viewport="700x420" name="Buttons, Badges & Stats" subtitle="CTA variants, sizes, category chips, animated counters" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style> body { padding: 28px; display:flex; flex-direction:column; gap: 26px; }
  .grp { display:flex; gap: 12px; flex-wrap: wrap; align-items:center; }
  .lab { font-family: var(--ap-font-mono); font-size: 11px; letter-spacing:.12em; text-transform:uppercase; color: var(--ap-text-tertiary); width: 100%; }
</style></head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, Badge, StatCounter } = window.ArenaPlayDesignSystem_492f49;
    function Demo() {
      return (
        <>
          <div className="grp"><span className="lab">Variants</span>
            <Button variant="primary">Rezervă acum</Button>
            <Button variant="secondary">Petrecere</Button>
            <Button variant="accent">Disponibil</Button>
            <Button variant="outline">Vezi jocurile</Button>
            <Button variant="ghost">Contact</Button>
          </div>
          <div className="grp"><span className="lab">Sizes & disabled</span>
            <Button size="sm">Small</Button>
            <Button size="md">Medium</Button>
            <Button size="lg">Large</Button>
            <Button disabled>Disabled</Button>
          </div>
          <div className="grp"><span className="lab">Badges</span>
            <Badge tone="primary">VR Dinamic</Badge>
            <Badge tone="secondary">Multiplayer</Badge>
            <Badge tone="accent" solid>Disponibil</Badge>
            <Badge tone="neutral">10+</Badge>
            <Badge tone="warning">3 ore</Badge>
          </div>
          <div className="grp" style={{gap:'48px'}}><span className="lab">Stat counters</span>
            <StatCounter value={16} label="Jucători simultan" tone="accent" />
            <StatCounter value={50} suffix="+" label="Jocuri VR" />
            <StatCounter value={3} suffix=" ore" label="Pachet petrecere" tone="secondary" />
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body></html>
